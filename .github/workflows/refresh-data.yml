# Daily data refresh. Every night at 04:15 UTC (09:45 IST) it pulls the last
# two days of food safety news, merges anything new into public/data.json,
# commits back to main if the file changed, and Vercel redeploys the site.
# On quiet nights nothing is committed. Runs take about 10 minutes.
#
# There is no backfill option. GDELT rate limits made the multi-year seed
# impractical in a single job. The site grows organically from whatever the
# daily runs pull in.

name: Refresh data

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

# Only one refresh in flight at a time. A new run queues behind the running
# one instead of killing it, so nothing gets cancelled mid-scrape.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Daily sweep needs about 10 min; 30 gives plenty of headroom for GDELT
    # slowness without letting a runaway hog the runner.
    timeout-minutes: 30
    permissions:
      # Needs to be able to push the rebuilt public/data.json back to main.
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # persist-credentials so the final git push uses GITHUB_TOKEN.
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Scrape GDELT
        env:
          LOOKBACK_DAYS: '2'
        run: python scrape_gdelt.py

      - name: Scrape Google News RSS (recent top-up)
        # Non-fatal. If Google throttles us we still have the GDELT sweep.
        continue-on-error: true
        run: python scrape_rss.py

      - name: Merge with existing data.json and build public/data.json
        run: python clean.py

      - name: Commit if data changed
        # Only commit when the file actually differs. git diff --quiet exits
        # non-zero on changes, so we invert with ! and only then push.
        # Prevents empty "no-op" commits on quiet days.
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- public/data.json; then
            echo "No changes to public/data.json, skipping commit."
            exit 0
          fi
          git add public/data.json
          COUNT=$(python -c "import json;print(len(json.load(open('public/data.json'))))")
          git commit -m "chore(data): daily refresh, ${COUNT} records"
          git push
